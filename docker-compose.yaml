services:
  vane:
    image: vane:latest
    build:
      context: .
    env_file:
      - .env
    environment:
      DATA_DIR: /home/vane
      # Inside the container Vane always reaches SearXNG on localhost:8080
      SEARXNG_API_URL: http://localhost:8080
    ports:
      - '${HOST_PORT:-3000}:3000'
      - '${SEARXNG_PORT:-8080}:8080'
    volumes:
      - data:/home/vane/data
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

volumes:
  data:
    name: 'vane-data'
